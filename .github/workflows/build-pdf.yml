name: Build LaTeX PDF

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-cyrillic

      - name: Compile proceedings
        working-directory: book
        run: latexmk -lualatex -interaction=nonstopmode -halt-on-error main.tex

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v7
        with:
          name: mptm-2026-part-2
          path: book/main.pdf
          if-no-files-found: error
          retention-days: 30
